name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  generator:
    name: Generator end-to-end + brand pre-flight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator (editable + test deps)
        run: |
          pip install --quiet -e skills/reeinvent-pitch-deck-design/generator
          pip install --quiet pytest

      - name: Run generator unit + integration tests
        run: pytest skills/reeinvent-pitch-deck-design/generator/tests/ -v

      - name: Build the full reference deck via the CLI
        run: |
          python -m reeinvent_pitch_deck build \
            skills/reeinvent-pitch-deck-design/generator/examples/reeinvent-full.json \
            -o reeinvent-full.pptx

      - name: Verify the built deck
        run: python -m reeinvent_pitch_deck verify reeinvent-full.pptx

      - name: Assert 6 fntdata entries (font embedding)
        run: |
          count=$(unzip -l reeinvent-full.pptx | grep -c fntdata)
          test "$count" = "6"

      - name: Assert presentation.xml has embeddedFontLst
        run: |
          unzip -p reeinvent-full.pptx ppt/presentation.xml | grep -q embeddedFontLst

      - name: Assert no spAutoFit in any slide
        run: |
          count=$(unzip -p reeinvent-full.pptx 'ppt/slides/*.xml' | grep -c spAutoFit || true)
          test "$count" = "0"

      - name: Bootstrap script - clean install path
        run: |
          rm -rf skills/reeinvent-pitch-deck-design/.venv
          skills/reeinvent-pitch-deck-design/bin/reeinvent-deck build \
            skills/reeinvent-pitch-deck-design/generator/examples/minimal.json \
            -o /tmp/minimal-bootstrap.pptx

      - name: Bootstrap script - idempotent reuse
        run: |
          # Second invocation should NOT recreate the venv. Capture and check.
          out=$(skills/reeinvent-pitch-deck-design/bin/reeinvent-deck verify /tmp/minimal-bootstrap.pptx 2>&1)
          echo "$out"
          if echo "$out" | grep -q "setting up Python environment"; then
            echo "FAIL: bootstrap re-ran setup on second invocation"
            exit 1
          fi

  lint:
    name: Brand-system lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No em-dash characters anywhere (rule 31)
        shell: bash
        run: |
          set -e
          hits=$(grep -rlP '\x{2014}' \
            --include='*.md' --include='*.py' --include='*.json' \
            --include='*.svg' --include='*.yml' --include='*.yaml' \
            --exclude-dir='.venv' \
            . 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "FAIL: em-dash (U+2014) found in:"
            echo "$hits"
            exit 1
          fi
          echo "OK: zero em-dashes"

      - name: SVG assets reference only the 9 canonical hex codes
        shell: bash
        run: |
          set -e
          allowed='^(0A1220|1B2848|F5F5F5|FFFFFF|2665E2|3C74E2|6C94E5|A942EF|C26DE6|D79BEC)$'
          fail=0
          for f in skills/reeinvent-pitch-deck-design/assets/logo/*.svg; do
            while read -r hex; do
              up=$(echo "$hex" | tr 'a-f' 'A-F' | tr -d '#')
              if ! echo "$up" | grep -qE "$allowed"; then
                echo "FAIL: $f uses non-canonical hex #$up"
                fail=1
              fi
            done < <(grep -oiE '#[0-9a-f]{6}' "$f")
          done
          test "$fail" = "0"
          echo "OK: every SVG hex is on the 9-color palette"

      - name: Version sync (VERSION == plugin.json == marketplace.json == pyproject.toml)
        shell: bash
        run: |
          set -e
          v_file=$(tr -d '[:space:]' < VERSION)
          v_plugin=$(python -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          v_market=$(python -c "import json; print(json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['version'])")
          v_pkg=$(grep '^version' skills/reeinvent-pitch-deck-design/generator/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$v_file plugin.json=$v_plugin marketplace.json=$v_market pyproject.toml=$v_pkg"
          test "$v_file" = "$v_plugin"
          test "$v_file" = "$v_market"
          test "$v_file" = "$v_pkg"
          echo "OK: versions are in sync across all four files"

      - name: Required brand assets present
        shell: bash
        run: |
          set -e
          base=skills/reeinvent-pitch-deck-design/assets
          required=(
            "$base/logo/Arrow-Up.svg"          "$base/logo/Arrow-Up@2x.png"
            "$base/logo/Upwards-Arrow.svg"     "$base/logo/Upwards-Arrow@2x.png"
            "$base/logo/White-Logo.svg"        "$base/logo/White-Logo@2x.png"
            "$base/logo/Gradient-Logo.svg"     "$base/logo/Gradient-Logo@2x.png"
            "$base/fonts/Roboto/Roboto-Light.ttf"
            "$base/fonts/Roboto/Roboto-Regular.ttf"
            "$base/fonts/Roboto/Roboto-Italic.ttf"
            "$base/fonts/Roboto/Roboto-Medium.ttf"
            "$base/fonts/Roboto/Roboto-Bold.ttf"
            "$base/fonts/Roboto/Roboto-Black.ttf"
            "$base/fonts/Roboto/LICENSE.txt"
          )
          fail=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "FAIL: missing $f"
              fail=1
            fi
          done
          test "$fail" = "0"
          echo "OK: every required brand asset is present"

      - name: Plugin manifest names agree
        shell: bash
        run: |
          set -e
          mp=$(python -c "import json; print(json.load(open('.claude-plugin/marketplace.json'))['plugins'][0]['name'])")
          pl=$(python -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['name'])")
          test "$mp" = "$pl"
          echo "OK: marketplace.plugins[0].name == plugin.json.name == $mp"

      - name: Marketplace plugin entry is Desktop-installable
        shell: bash
        run: |
          set -e
          python <<'PY'
          import json, os
          mp = json.load(open(".claude-plugin/marketplace.json"))
          plug = mp["plugins"][0]
          assert "skills" in plug, "FAIL: plugins[0].skills missing"
          assert isinstance(plug["skills"], list) and len(plug["skills"]) > 0, \
              "FAIL: plugins[0].skills must be a non-empty array"
          for rel in plug["skills"]:
              skill_md = os.path.join(rel.lstrip("./"), "SKILL.md")
              assert os.path.isfile(skill_md), \
                  f"FAIL: declared skill '{rel}' has no SKILL.md at {skill_md}"
          src = plug.get("source", "")
          src_dir = "." if src in (".", "./", "") else src
          assert os.path.isfile(os.path.join(src_dir, ".claude-plugin", "plugin.json")), \
              f"FAIL: source='{src}' has no .claude-plugin/plugin.json"
          print(f"OK: marketplace plugin entry validates ({len(plug['skills'])} skill path(s))")
          PY

      - name: bin/reeinvent-deck script is executable
        shell: bash
        run: |
          test -x skills/reeinvent-pitch-deck-design/bin/reeinvent-deck
          echo "OK: bin/reeinvent-deck is executable"
